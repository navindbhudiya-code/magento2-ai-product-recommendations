name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit tests
        # Uses the module test launcher (works regardless of the consumer project's
        # autoload config). In a standalone checkout vendor/bin/phpunit also works.
        run: php dev/demo/phpunit-launcher.php -c Test/Unit/phpunit.xml.dist

  coding-standard:
    name: phpcs (Magento2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Register the Magento coding standard
        run: vendor/bin/phpcs --config-set installed_paths vendor/magento/magento-coding-standard || true

      - name: Run phpcs
        # Legacy debt is tracked in dev/demo/AUDIT.md and burned down over time, so this
        # gate is reported but non-blocking until the debt reaches zero.
        continue-on-error: true
        run: vendor/bin/phpcs --standard=phpcs.xml .
